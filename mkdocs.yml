site_name: MockingJay Documentation
site_url: https://ashczar77.github.io/mockingjay
site_description: Open-source testing platform for voice AI agents
site_author: Ashton Czarnecki

repo_name: ashczar77/mockingjay
repo_url: https://github.com/ashczar77/mockingjay

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Configuration:
    - Overview: configuration/overview.md
    - Scenarios: configuration/scenarios.md
    - Metrics: configuration/metrics.md
  - CLI Reference: cli-reference.md
  - API Reference: api-reference.md
  - Examples: examples.md
  - Best Practices: best-practices.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
