name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      
      - name: Build CLI for multiple platforms
        run: |
          cd cli
          
          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -o mockingjay-linux-amd64
          
          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -o mockingjay-linux-arm64
          
          # macOS AMD64
          GOOS=darwin GOARCH=amd64 go build -o mockingjay-darwin-amd64
          
          # macOS ARM64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -o mockingjay-darwin-arm64
          
          # Windows AMD64
          GOOS=windows GOARCH=amd64 go build -o mockingjay-windows-amd64.exe
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cli/mockingjay-linux-amd64
            cli/mockingjay-linux-arm64
            cli/mockingjay-darwin-amd64
            cli/mockingjay-darwin-arm64
            cli/mockingjay-windows-amd64.exe
          draft: false
          prerelease: false
          generate_release_notes: true
